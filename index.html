<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slope 2D 🟢</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
    }

    h1.site-title {
      color: #aaa;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
      opacity: 0.6;
    }

    #gameWrapper {
      position: relative;
      width: 320px;
      height: 450px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,200,100,0.2), 0 0 0 1px rgba(255,255,255,0.08);
    }

    #gameCanvas {
      display: block;
      width: 320px;
      height: 450px;
    }

    /* ── Screens ── */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: opacity 0.2s;
    }
    .screen.hidden { display: none; }

    /* MENU */
    #menuScreen { background: white; }
    #menuScreen h2 {
      font-size: 36px;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 6px;
    }
    #menuScreen .tagline {
      font-size: 13px;
      color: #888;
      margin-bottom: 40px;
    }
    .menuBtn {
      width: 100%;
      padding: 12px 0;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .menuBtn:hover { opacity: 0.85; transform: translateY(-1px); }
    .menuBtn:active { transform: translateY(0); }
    .btn-play { background: #22c55e; color: white; }
    .btn-settings { background: #f1f5f9; color: #334155; }
    .key-hint {
      margin-top: 16px;
      font-size: 12px;
      color: #aaa;
      text-align: center;
      line-height: 1.8;
    }
    kbd {
      background: #f1f5f9;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 11px;
      color: #374151;
    }

    /* SETTINGS */
    #settingsScreen { background: white; }
    #settingsScreen h2 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    .settings-sub {
      font-size: 12px;
      color: #888;
      margin-bottom: 24px;
    }
    .settings-group { width: 100%; margin-bottom: 20px; }
    .settings-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .fps-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .fps-btn {
      padding: 9px 0;
      border: 2px solid #e2e8f0;
      border-radius: 7px;
      background: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: #475569;
      transition: all 0.15s;
    }
    .fps-btn.active {
      border-color: #22c55e;
      color: #16a34a;
      background: #f0fdf4;
    }
    .fps-btn:hover:not(.active) { border-color: #94a3b8; }
    .color-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .color-swatch {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .color-swatch:hover { transform: scale(1.1); }
    .color-swatch.active { border-color: #22c55e; }
    .back-btn {
      margin-top: 8px;
      background: none;
      border: none;
      color: #f97316;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .back-btn:hover { text-decoration: underline; }

    /* GAME OVER */
    #gameoverScreen { background: rgba(0,0,0,0.82); backdrop-filter: blur(4px); }
    #gameoverScreen h2 {
      font-size: 32px;
      font-weight: 800;
      color: #ef4444;
      margin-bottom: 6px;
    }
    .go-score {
      font-size: 18px;
      color: white;
      margin-bottom: 4px;
    }
    .go-best {
      font-size: 14px;
      color: #86efac;
      margin-bottom: 32px;
    }
    .go-wave {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 32px;
    }
    .go-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }
    .go-actions button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-replay { background: #22c55e; color: white; }
    .btn-menu { background: #334155; color: #cbd5e1; }

    /* HUD */
    #hud {
      position: absolute;
      top: 12px;
      left: 14px;
      right: 14px;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
    }
    .hud-pill {
      background: rgba(0,0,0,0.35);
      color: white;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
      font-weight: 600;
      backdrop-filter: blur(4px);
    }
    #hud.hidden { display: none; }

    /* Footer hint */
    #controls {
      margin-top: 14px;
      font-size: 12px;
      color: #555;
      text-align: center;
      line-height: 1.7;
    }
  </style>
</head>
<body>

<h1 class="site-title">Slope 2D</h1>

<div id="gameWrapper">
  <canvas id="gameCanvas" width="320" height="450"></canvas>

  <!-- HUD (shown during gameplay) -->
  <div id="hud" class="hidden">
    <div class="hud-pill" id="hudScore">Score: 0</div>
    <div class="hud-pill" id="hudWave">Wave 1</div>
    <div class="hud-pill" id="hudBest">Best: 0</div>
  </div>

  <!-- MENU SCREEN -->
  <div id="menuScreen" class="screen">
    <h2>Slope 2D 🟢</h2>
    <p class="tagline">Dodge the reds. Grab the orbs. Survive.</p>
    <button class="menuBtn btn-play" id="btnPlay">▶ Play</button>
    <button class="menuBtn btn-settings" id="btnOpenSettings">⚙ Settings</button>
    <p class="key-hint">
      <kbd>W A S D</kbd> to move &nbsp;·&nbsp; <kbd>Enter</kbd> to start<br>
      <kbd>Shift</kbd> to return to menu anytime
    </p>
  </div>

  <!-- SETTINGS SCREEN -->
  <div id="settingsScreen" class="screen hidden">
    <h2>⚙ Settings</h2>
    <p class="settings-sub">Customise your experience</p>

    <div class="settings-group">
      <label>Game Speed (FPS)</label>
      <div class="fps-grid">
        <button class="fps-btn active" data-fps="60">60 FPS<br><small style="font-weight:400;font-size:11px">Ultra Fluid</small></button>
        <button class="fps-btn" data-fps="45">45 FPS<br><small style="font-weight:400;font-size:11px">High Speed</small></button>
        <button class="fps-btn" data-fps="30">30 FPS<br><small style="font-weight:400;font-size:11px">Arcade</small></button>
        <button class="fps-btn" data-fps="5">5 FPS<br><small style="font-weight:400;font-size:11px">Slow-Mo 😵</small></button>
      </div>
    </div>

    <div class="settings-group">
      <label>Background Colour</label>
      <div class="color-row" id="colorRow">
        <div class="color-swatch active" data-color="white" style="background:white;border-color:#d1d5db;"></div>
        <div class="color-swatch" data-color="#E3F2FD" style="background:#E3F2FD;"></div>
        <div class="color-swatch" data-color="#F3E5F5" style="background:#F3E5F5;"></div>
        <div class="color-swatch" data-color="#E8F5E9" style="background:#E8F5E9;"></div>
        <div class="color-swatch" data-color="#FFF3E0" style="background:#FFF3E0;"></div>
        <div class="color-swatch" data-color="#1a1a2e" style="background:#1a1a2e;"></div>
      </div>
    </div>

    <button class="back-btn" id="btnBackToMenu">⬅ Back to Menu &nbsp;<kbd>Shift</kbd></button>
  </div>

  <!-- GAME OVER SCREEN -->
  <div id="gameoverScreen" class="screen hidden">
    <h2>GAME OVER 💥</h2>
    <p class="go-score" id="goScore">Score: 0</p>
    <p class="go-best" id="goBest">🏆 Best: 0</p>
    <p class="go-wave" id="goWave">Reached Wave 1</p>
    <div class="go-actions">
      <button class="btn-replay" id="btnReplay">▶ Play Again &nbsp;<kbd style="background:#16a34a;border-color:#15803d;color:white">Enter</kbd></button>
      <button class="btn-menu" id="btnGoMenu">⬅ Main Menu &nbsp;<kbd style="background:#1e293b;border-color:#334155;color:#94a3b8">Shift</kbd></button>
    </div>
  </div>
</div>

<div id="controls">
  <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move &nbsp;·&nbsp;
  <kbd>Shift</kbd> menu &nbsp;·&nbsp;
  <kbd>Enter</kbd> start / restart
</div>

<script>
// ─────────────────────────────────────────
//  SLOPE 2D — GitHub Web Port
//  Converted from Code.org App Lab
// ─────────────────────────────────────────

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 320, H = 450;

// ── State ──
let gameState = 'menu'; // menu | settings | playing | gameover
let gameActive = false;

// ── Settings ──
let gameFPS = 60;
let bgColor = 'white';

// ── Player ──
let playerX = 140, playerY = 380;
const playerSpeed = 7;
const PLAYER_SIZE = 32;
const PLAYER_EMOJI = '🟢';

// ── Score / Wave ──
let score = 0, highScore = 0, currentWave = 1;

// ── Balls ──
let ball1X, ball1Y, ball1Speed = 4;
let ball2X, ball2Y = -150, ball2Speed = 4, isBall2Active = false;
let ball3X, ball3Y = -300, ball3Speed = 4, isBall3Active = false;
const BALL_SIZE = 44;

// ── Orb ──
let orbX, orbY, orbType = 'gold', orbPoints = 5;
const ORB_EMOJI_MAP = { gold: '🌟', purple: '🔮', pink: '💖', secret: '🌈' };
let orbEmoji = '🌟';

// ── Keys ──
const keys = { w: false, a: false, s: false, d: false };

// ── Engine ──
let lastTime = 0, accumulator = 0;
let frameInterval = 1000 / gameFPS;
let engineRAF;

// ── DOM refs ──
const screens = {
  menu: document.getElementById('menuScreen'),
  settings: document.getElementById('settingsScreen'),
  gameover: document.getElementById('gameoverScreen'),
};
const hud = document.getElementById('hud');
const hudScore = document.getElementById('hudScore');
const hudWave  = document.getElementById('hudWave');
const hudBest  = document.getElementById('hudBest');

// ─────────────────────────────────────────
//  Utility
// ─────────────────────────────────────────
function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function dist(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }

function showScreen(name) {
  Object.values(screens).forEach(s => s.classList.add('hidden'));
  hud.classList.add('hidden');
  if (name && screens[name]) screens[name].classList.remove('hidden');
  if (name === 'playing') hud.classList.remove('hidden');
}

// ─────────────────────────────────────────
//  Canvas drawing helpers
// ─────────────────────────────────────────
function drawEmoji(emoji, x, y, size) {
  ctx.font = `${size}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, x, y);
}

function renderFrame() {
  // Background
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, W, H);

  if (gameState !== 'playing') return;

  // Subtle grid lines for depth
  ctx.strokeStyle = 'rgba(0,0,0,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // Orb
  drawEmoji(orbEmoji, orbX + 17, orbY + 17, 22);

  // Balls
  drawEmoji('🔴', ball1X + 30, ball1Y + 30, 40);
  if (isBall2Active) drawEmoji('🔴', ball2X + 30, ball2Y + 30, 40);
  if (isBall3Active) drawEmoji('🔴', ball3X + 30, ball3Y + 30, 40);

  // Player
  drawEmoji(PLAYER_EMOJI, playerX + PLAYER_SIZE / 2, playerY + PLAYER_SIZE / 2, 26);
}

// ─────────────────────────────────────────
//  Orb respawn
// ─────────────────────────────────────────
function respawnOrb() {
  const roll = rnd(1, 100);
  if (roll === 1)        { orbType = 'secret'; orbPoints = 100; orbX = rnd(20,260); orbY = rnd(60,140); }
  else if (roll <= 10)   { orbType = 'pink';   orbPoints = 20;  orbX = rnd(20,260); orbY = rnd(60,160); }
  else if (roll <= 30)   { orbType = 'purple'; orbPoints = 10;  orbX = rnd(20,260); orbY = rnd(140,230);}
  else                   { orbType = 'gold';   orbPoints = 5;   orbX = rnd(20,260); orbY = rnd(240,360);}
  orbEmoji = ORB_EMOJI_MAP[orbType];
}

// ─────────────────────────────────────────
//  Game Start / Reset
// ─────────────────────────────────────────
function startGame() {
  score = 0;
  currentWave = 1;
  playerX = 140; playerY = 380;
  keys.w = keys.a = keys.s = keys.d = false;

  ball1X = rnd(20, 240); ball1Y = 0;
  ball2X = rnd(20, 240); ball2Y = -150; isBall2Active = false;
  ball3X = rnd(20, 240); ball3Y = -300; isBall3Active = false;

  respawnOrb();
  gameState = 'playing';
  gameActive = true;
  showScreen('playing');
  frameInterval = 1000 / gameFPS;
  lastTime = performance.now();
  accumulator = 0;
  if (!engineRAF) engineTick(performance.now());
}

// ─────────────────────────────────────────
//  Game Over
// ─────────────────────────────────────────
function triggerGameOver() {
  gameActive = false;
  gameState = 'gameover';
  if (score > highScore) highScore = score;
  document.getElementById('goScore').textContent = `Score: ${score}`;
  document.getElementById('goBest').textContent  = `🏆 Best: ${highScore}`;
  document.getElementById('goWave').textContent  = `Reached Wave ${currentWave}`;
  showScreen('gameover');
}

// ─────────────────────────────────────────
//  Engine Tick (RAF-based, FPS-capped)
// ─────────────────────────────────────────
function engineTick(now) {
  engineRAF = requestAnimationFrame(engineTick);

  const delta = now - lastTime;
  lastTime = now;
  accumulator += delta;

  if (accumulator < frameInterval) {
    renderFrame();
    return;
  }
  accumulator = 0;

  if (gameState !== 'playing' || !gameActive) {
    renderFrame();
    return;
  }

  // ── Movement ──
  const spd = (60 / gameFPS) * playerSpeed;
  if (keys.w && playerY > 50)  playerY -= spd;
  if (keys.s && playerY < 400) playerY += spd;
  if (keys.a && playerX > 10)  playerX -= spd;
  if (keys.d && playerX < 270) playerX += spd;

  // ── Wave & speed ──
  const calcWave = Math.floor(score / 10) + 1;
  currentWave = Math.min(calcWave, 100);
  const fss = 60 / gameFPS;
  const waveSpd = (4 + currentWave * 0.35) * fss;
  ball1Speed = ball2Speed = ball3Speed = waveSpd;

  if (currentWave >= 2) isBall2Active = true;
  if (currentWave >= 5) isBall3Active = true;

  if (score > highScore) highScore = score;
  hudScore.textContent = `Score: ${score}`;
  hudWave.textContent  = `Wave ${currentWave}`;
  hudBest.textContent  = `Best: ${highScore}`;

  // ── Ball 1 ──
  ball1Y += ball1Speed;
  if (ball1Y > H + 10) { ball1Y = -20; ball1X = rnd(20, 240); score++; }

  // ── Ball 2 ──
  if (isBall2Active) {
    ball2Y += ball2Speed;
    if (ball2Y > H + 10) { ball2Y = -20; ball2X = rnd(20, 240); score++; }
  }

  // ── Ball 3 ──
  if (isBall3Active) {
    ball3Y += ball3Speed;
    if (ball3Y > H + 10) { ball3Y = -20; ball3X = rnd(20, 240); score++; }
  }

  // ── Orb collect ──
  const pCX = playerX + PLAYER_SIZE / 2, pCY = playerY + PLAYER_SIZE / 2;
  if (dist(pCX, pCY, orbX + 17, orbY + 17) < 30) {
    score += orbPoints;
    respawnOrb();
  }

  // ── Collision ──
  const d1 = dist(pCX, pCY, ball1X + 30, ball1Y + 30);
  const d2 = dist(pCX, pCY, ball2X + 30, ball2Y + 30);
  const d3 = dist(pCX, pCY, ball3X + 30, ball3Y + 30);
  const hit = d1 < 36 || (isBall2Active && d2 < 36) || (isBall3Active && d3 < 36);
  if (hit) { triggerGameOver(); }

  renderFrame();
}

// Kick off the RAF loop once
engineTick(performance.now());

// ─────────────────────────────────────────
//  Keyboard
// ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (gameState === 'playing' && gameActive) {
    if (k === 'w') keys.w = true;
    if (k === 'a') keys.a = true;
    if (k === 's') keys.s = true;
    if (k === 'd') keys.d = true;
    if (e.key === 'Shift') { gameActive = false; showMenu(); }
  } else if (gameState === 'menu') {
    if (e.key === 'Enter') startGame();
    if (k === 's') openSettings();
  } else if (gameState === 'settings') {
    if (e.key === 'Shift') showMenu();
  } else if (gameState === 'gameover') {
    if (e.key === 'Enter') startGame();
    if (e.key === 'Shift') showMenu();
  }
});

document.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  if (k === 'w') keys.w = false;
  if (k === 'a') keys.a = false;
  if (k === 's') keys.s = false;
  if (k === 'd') keys.d = false;
});

// ─────────────────────────────────────────
//  Screen helpers
// ─────────────────────────────────────────
function showMenu() {
  gameState = 'menu';
  gameActive = false;
  showScreen('menu');
}
function openSettings() {
  gameState = 'settings';
  showScreen('settings');
}

// ─────────────────────────────────────────
//  Button wiring
// ─────────────────────────────────────────
document.getElementById('btnPlay').addEventListener('click', startGame);
document.getElementById('btnOpenSettings').addEventListener('click', openSettings);
document.getElementById('btnBackToMenu').addEventListener('click', showMenu);
document.getElementById('btnReplay').addEventListener('click', startGame);
document.getElementById('btnGoMenu').addEventListener('click', showMenu);

// FPS buttons
document.querySelectorAll('.fps-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fps-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    gameFPS = parseInt(btn.dataset.fps);
    frameInterval = 1000 / gameFPS;
  });
});

// Color swatches
document.querySelectorAll('.color-swatch').forEach(sw => {
  sw.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    bgColor = sw.dataset.color;
  });
});

// ─────────────────────────────────────────
//  Init: show menu
// ─────────────────────────────────────────
showMenu();
</script>
</body>
</html>
